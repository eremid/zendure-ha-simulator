# Mosquitto configuration for Zendure simulator
# Anonymous access is intentional: this broker is for local development only.

# Port 1883 — "cloud" MQTT
# mock_api returns this as the Zendure cloud MQTT URL.
# SF2400AC+ simulator publishes here.
listener 1883
allow_anonymous true

# Port 1884 — "local" MQTT
# Configure this in the HA Zendure integration config flow as "local MQTT server".
# Hyper 2000 simulators publish here → HA auto-sets device.mqtt = Api.mqttLocal → status 11.
listener 1884
allow_anonymous true

# WebSocket listener (optional, useful for browser-based debugging)
listener 9001
protocol websockets
allow_anonymous true

# Persistence
persistence false

# Logging
log_type error
log_type warning
log_type notice
log_type information
